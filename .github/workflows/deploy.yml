name: Deploy to GitHub Pages

# 정적 사이트(HTML/JS)를 GitHub Actions로 배포. 기존 legacy 빌드의 배포 단계
# 간헐 실패("Deployment failed"/"Timeout reached") 대신, 공식 deploy-pages 액션 +
# 자동 재시도(최대 3회)로 스스로 복구되게 함. main에 push되면 자동 배포.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 방지(한 번에 하나만). 진행 중인 건 취소하지 않고 큐잉.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 저장소 전체를 그대로 업로드(CNAME 포함 → 커스텀 도메인 유지, Jekyll 미실행)
          path: '.'

      # ── 배포: GitHub Pages 배포 API가 간헐적으로 뻗어서 최대 3회 자동 재시도 ──
      - name: Deploy (attempt 1)
        id: d1
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Wait before retry 1
        if: steps.d1.outcome == 'failure'
        run: sleep 25
      - name: Deploy (attempt 2)
        id: d2
        if: steps.d1.outcome == 'failure'
        continue-on-error: true
        uses: actions/deploy-pages@v4
      - name: Wait before retry 2
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        run: sleep 40
      - name: Deploy (attempt 3, final)
        if: steps.d1.outcome == 'failure' && steps.d2.outcome == 'failure'
        uses: actions/deploy-pages@v4
