<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boothmate Overlay</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: "Pretendard", -apple-system, system-ui, sans-serif;
  }

  /* ── 배경 레이어: 투명도 조절 대상 ── */
  #bg {
    position: fixed; inset: 0;
    background: rgba(11, 14, 20, 0.82);
    transition: background 0.3s;
    z-index: 0;
  }

  /* ── 워터마크 ── */
  #watermark {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none; z-index: 1;
    opacity: 0.07;
    user-select: none;
  }
  #watermark img {
    width: clamp(200px, 40%, 480px);
    height: auto;
    filter: grayscale(1) brightness(3);
  }

  /* ── 자막 영역 ── */
  #subtitleWrap {
    position: fixed; inset: 0;
    z-index: 2;
    padding: 16px 20px 72px;   /* 아래쪽 컨트롤 영역 여백 */
    overflow-y: auto;
    display: flex; flex-direction: column; justify-content: flex-end;
    gap: var(--pair-gap, 10px);
    scroll-behavior: smooth;
  }

  .pair {
    display: flex; flex-direction: column; gap: 2px;
  }
  .srcline {
    font-size: var(--src-size, 16px);
    color: var(--src-color, rgba(155,170,193,0.82));
    line-height: 1.45;
    word-break: break-word;
  }
  .srcline.pending { opacity: 1; }
  .transline {
    font-size: var(--trans-size, 26px);
    color: var(--trans-color, #ffffff);
    font-weight: 700;
    line-height: 1.5;
    word-break: break-word;
  }
  .transline.pending { opacity: 1; }
  /* 용어집 표준표기 하이라이트 — 형광펜처럼 단어를 색으로 감쌈(어두운 배경용 반투명 인디고) */
  .transline .gword {
    background: rgba(129,140,248,0.42);
    color: #F2F4FF;
    border-radius: 4px;
    padding: 0 3px;
    -webkit-box-decoration-break: clone;
    box-decoration-break: clone;
  }

  /* ── 대기 메시지 ── */
  #hint {
    color: rgba(150,170,200,0.5);
    font-size: 14px;
    text-align: center;
    padding: 40px 0;
  }

  /* ── 컨트롤 패널 (우측 상단) — Claude Design 톤: 프로스티드 다크 + hairline ── */
  #controls {
    position: fixed;
    top: 10px; right: 12px;
    z-index: 10;
    display: flex; align-items: center; gap: 4px;
    padding: 5px 6px;
    border-radius: 12px;
    background: rgba(22,27,38,0.78);
    border: 0.5px solid rgba(255,255,255,0.10);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: #aeb8cc;
    transition: opacity 0.3s;
  }
  #controls:hover { opacity: 1 !important; }

  /* 아이콘/스텝 버튼 공통 */
  .ctrl-btn {
    width: 28px; height: 28px;
    border: none; background: transparent; cursor: pointer;
    border-radius: 8px;
    font-size: 13px; line-height: 1;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
    color: #aeb8cc;
  }
  .ctrl-btn:hover { background: rgba(129,140,248,0.22); color: #e3e7f6; }
  .ctrl-btn svg { display: block; }
  .ctrl-btn sub, .ctrl-btn sup { font-size: 9px; }

  /* 그룹(라벨+버튼+스와치) 묶음 */
  .ctrl-group { display: flex; align-items: center; gap: 3px; padding: 0 2px; }

  /* 그룹 라벨 */
  .ctrl-label {
    font-size: 10px;
    color: #7d8ba0;
    white-space: nowrap;
    margin: 0 1px 0 2px;
  }

  /* 투명도 슬라이더 */
  input[type="range"].ctrl-slider {
    width: 64px; height: 4px;
    accent-color: #818CF8;
    cursor: pointer;
  }

  /* 색상 스와치 — input[type=color]를 동그란 칩으로 */
  input[type="color"].ctrl-color {
    width: 18px; height: 18px;
    border: 1.5px solid rgba(255,255,255,0.4);
    background: none;
    cursor: pointer; border-radius: 50%;
    padding: 0; overflow: hidden;
  }
  input[type="color"].ctrl-color::-webkit-color-swatch-wrapper { padding: 0; }
  input[type="color"].ctrl-color::-webkit-color-swatch { border: none; border-radius: 50%; }
  input[type="color"].ctrl-color::-moz-color-swatch { border: none; border-radius: 50%; }

  /* 구분선 */
  .ctrl-sep {
    width: 1px; height: 18px;
    background: rgba(255,255,255,0.12);
    margin: 0 3px;
  }

  /* 접기/펼치기 토글 — 펼침=» 셰브론, 접힘=슬라이더 아이콘 */
  #togglePanel .ic-expand { display: none; }
  #togglePanel.is-collapsed .ic-collapse { display: none; }
  #togglePanel.is-collapsed .ic-expand { display: block; }
  #panelInner {
    display: flex; align-items: center; gap: 4px;
    overflow: hidden;
    max-width: 520px;
    transition: max-width 0.3s, opacity 0.3s;
  }
  #panelInner.collapsed { max-width: 0; opacity: 0; pointer-events: none; }
</style>
</head>

<!-- 컨트롤 패널 (Claude Design 톤으로 다듬음 — ID/핸들러는 기존과 동일) -->
<div id="controls">
  <button class="ctrl-btn" id="togglePanel" title="컨트롤 접기" aria-label="컨트롤 접기/펼치기">
    <svg class="ic-collapse" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M13 6l6 6-6 6M5 6l6 6-6 6"/></svg>
    <svg class="ic-expand" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h10M4 12h16M4 18h7"/><circle cx="18" cy="6" r="2"/><circle cx="9" cy="12" r="2" fill="currentColor"/><circle cx="14" cy="18" r="2"/></svg>
  </button>
  <div id="panelInner">
    <!-- 투명도 -->
    <span class="ctrl-group">
      <svg width="15" height="15" viewBox="0 0 24 24" stroke="#8b96ab" stroke-width="1.5" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none"/><path d="M12 3a9 9 0 0 0 0 18z" fill="#8b96ab" stroke="none"/></svg>
      <input type="range" class="ctrl-slider" id="opacitySlider" min="0" max="50" value="50" title="투명도">
    </span>

    <div class="ctrl-sep"></div>

    <!-- 원문 -->
    <span class="ctrl-group">
      <span class="ctrl-label">원문</span>
      <button class="ctrl-btn" id="srcMinus" title="원문 작게" aria-label="원문 작게">A<sub>−</sub></button>
      <button class="ctrl-btn" id="srcPlus"  title="원문 크게" aria-label="원문 크게" style="font-size:15px;">A<sup>+</sup></button>
      <input type="color" class="ctrl-color" id="srcColor" value="#9FB0C7" title="원문 색상">
    </span>

    <div class="ctrl-sep"></div>

    <!-- 번역 -->
    <span class="ctrl-group">
      <span class="ctrl-label">번역</span>
      <button class="ctrl-btn" id="traMinus" title="번역 작게" aria-label="번역 작게">A<sub>−</sub></button>
      <button class="ctrl-btn" id="traPlus"  title="번역 크게" aria-label="번역 크게" style="font-size:15px;">A<sup>+</sup></button>
      <input type="color" class="ctrl-color" id="traColor" value="#ffffff" title="번역 색상">
    </span>

    <div class="ctrl-sep"></div>

    <!-- 줄간격 -->
    <span class="ctrl-group">
      <span class="ctrl-label">줄간격</span>
      <button class="ctrl-btn" id="gapMinus" title="줄간격 좁게" aria-label="줄간격 좁게">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"/></svg>
      </button>
      <button class="ctrl-btn" id="gapPlus"  title="줄간격 넓게" aria-label="줄간격 넓게">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </span>
  </div>
</div>

<!-- 자막 -->
<div id="subtitleWrap">
  <div id="hint">메인 콘솔에서 통역을 시작하면 자막이 여기 표시됩니다.</div>
</div>

<script>
const wrap = document.getElementById('subtitleWrap');
const bg   = document.getElementById('bg');
const ctrl = document.getElementById('controls');

/* ── 상태 ── */
let srcSize  = parseInt(localStorage.getItem('ov_src_size')  || '17');
let traSize  = parseInt(localStorage.getItem('ov_tra_size')  || '26');
let srcColor = localStorage.getItem('ov_src_color') || '#9FB0C7';
let traColor = localStorage.getItem('ov_tra_color') || '#ffffff';
let opacity  = Math.min(50, parseInt(localStorage.getItem('ov_opacity') || '50'));
let lineGap  = parseInt(localStorage.getItem('ov_line_gap') || '10');

/* OBS/스트리밍 모드: ?obs → 배경 완전 투명 + 컨트롤 숨김(캡처 깔끔).
   크기·색은 URL로도 지정: ?src=18&tra=28&srccolor=b4c8e6&tracolor=ffffff&gap=12 */
const _q = new URLSearchParams(location.search);
if (_q.get('src'))      srcSize  = parseInt(_q.get('src'))  || srcSize;
if (_q.get('tra'))      traSize  = parseInt(_q.get('tra'))  || traSize;
if (_q.get('gap'))      lineGap  = parseInt(_q.get('gap'))  || lineGap;
if (_q.get('srccolor')) srcColor = '#' + _q.get('srccolor').replace(/^#/, '');
if (_q.get('tracolor')) traColor = '#' + _q.get('tracolor').replace(/^#/, '');
const obsMode = _q.has('obs') || _q.has('clean') || _q.has('transparent');
if (obsMode) {
  opacity = 0;                  // 배경 완전 투명 (OBS 브라우저 소스에 글자만 합성)
  ctrl.style.display = 'none';  // 컨트롤 패널 숨김
}

function applyStyles() {
  document.documentElement.style.setProperty('--src-size',   srcSize  + 'px');
  document.documentElement.style.setProperty('--trans-size', traSize  + 'px');
  document.documentElement.style.setProperty('--src-color',   srcColor);
  document.documentElement.style.setProperty('--trans-color', traColor);
  document.documentElement.style.setProperty('--pair-gap',    lineGap  + 'px');

  const alpha = opacity / 100;
  bg.style.background = 'rgba(10,14,26,' + alpha + ')';

  // 투명도에 따라 컨트롤 버튼 색상 자동 조정 (배경이 투명할수록 어두운 버튼은 안 보임)
  const lightness = opacity < 40 ? 'dark' : 'light';
  if (lightness === 'dark') {
    // 배경이 거의 투명 → 버튼을 진하게
    ctrl.style.background = 'rgba(13,17,24,0.80)';
    ctrl.style.color = '#ffffff';
  } else {
    ctrl.style.background = 'rgba(20,24,33,0.55)';
    ctrl.style.color = '#ffffff';
  }
  // 컨트롤 자체도 너무 투명하면 잘 안 보이므로 반투명 유지
  ctrl.style.opacity = Math.max(0.4, opacity / 100 * 1.2).toString();
}

function save() {
  localStorage.setItem('ov_src_size',   srcSize);
  localStorage.setItem('ov_tra_size',   traSize);
  localStorage.setItem('ov_src_color',  srcColor);
  localStorage.setItem('ov_tra_color',  traColor);
  localStorage.setItem('ov_opacity',    opacity);
  localStorage.setItem('ov_line_gap',   lineGap);
}

/* ── 컨트롤 바인딩 ── */
const opSlider = document.getElementById('opacitySlider');
opSlider.value = opacity;
opSlider.oninput = () => { opacity = parseInt(opSlider.value); applyStyles(); save(); };

document.getElementById('srcMinus').onclick = () => { if (srcSize > 10) { srcSize -= 2; applyStyles(); save(); } };
document.getElementById('srcPlus' ).onclick = () => { if (srcSize < 60) { srcSize += 2; applyStyles(); save(); } };
document.getElementById('traMinus').onclick = () => { if (traSize > 10) { traSize -= 2; applyStyles(); save(); } };
document.getElementById('traPlus' ).onclick = () => { if (traSize < 80) { traSize += 2; applyStyles(); save(); } };

document.getElementById('gapMinus').onclick = () => { lineGap = Math.max(0,  lineGap - 4); applyStyles(); save(); };
document.getElementById('gapPlus' ).onclick = () => { lineGap = Math.min(80, lineGap + 4); applyStyles(); save(); };

const srcColorPicker = document.getElementById('srcColor');
const traColorPicker = document.getElementById('traColor');
srcColorPicker.value = srcColor;
traColorPicker.value = traColor;
srcColorPicker.oninput = () => { srcColor = srcColorPicker.value; applyStyles(); save(); };
traColorPicker.oninput = () => { traColor = traColorPicker.value; applyStyles(); save(); };

/* 패널 접기/펼치기 — 펼침=» 셰브론(접기), 접힘=슬라이더 아이콘(펼치기) */
const panelInner = document.getElementById('panelInner');
const togglePanelBtn = document.getElementById('togglePanel');
togglePanelBtn.onclick = () => {
  panelInner.classList.toggle('collapsed');
  const collapsed = panelInner.classList.contains('collapsed');
  togglePanelBtn.classList.toggle('is-collapsed', collapsed);
  togglePanelBtn.title = collapsed ? '컨트롤 펼치기' : '컨트롤 접기';
};

/* ── 자막 렌더링 ── */
function renderSubtitles(srcLines, transLines) {
  const hint = document.getElementById('hint');
  if (hint) hint.remove();

  // 기존 pair 수를 맞춤
  const existing = wrap.querySelectorAll('.pair');
  const maxLen = Math.max(srcLines.length, transLines.length);

  // 부족한 pair 추가 (정해진 개수만큼만 — 무한 루프 불가)
  const haveCount = wrap.querySelectorAll('.pair').length;
  for (let i = haveCount; i < maxLen; i++) {
    const div = document.createElement('div');
    div.className = 'pair';
    const s = document.createElement('div'); s.className = 'srcline';
    const t = document.createElement('div'); t.className = 'transline';
    div.appendChild(s); div.appendChild(t);
    wrap.appendChild(div);
  }

  // 넘치는 pair 제거 — ⚠️ querySelectorAll은 정적 NodeList라 while+length로 돌면
  //   .remove()해도 length가 안 줄어 무한 루프(렌더러 정지)가 된다. 경계 for로 안전하게 제거.
  const allPairs = wrap.querySelectorAll('.pair');
  for (let i = allPairs.length - 1; i >= maxLen; i--) allPairs[i].remove();

  // 내용 채우기
  const curPairs = wrap.querySelectorAll('.pair');
  for (let i = 0; i < maxLen; i++) {
    const pair = curPairs[i];
    const sEl = pair.querySelector('.srcline');
    const tEl = pair.querySelector('.transline');
    const sl  = srcLines[i]   || { text: '', pending: false };
    const tl  = transLines[i] || { text: '', pending: false };
    sEl.textContent = sl.text;
    sEl.classList.toggle('pending', !!sl.pending);
    // 번역 줄: 메인에서 온 하이라이트 HTML(용어집 표준표기 .gword)을 그대로 표시. 없으면 텍스트.
    if (typeof tl.html === 'string') tEl.innerHTML = tl.html;
    else tEl.textContent = tl.text;
    tEl.classList.toggle('pending', !!tl.pending);
  }

  // 스크롤 맨 아래
  wrap.scrollTop = wrap.scrollHeight;
}

/* ── BroadcastChannel 수신 ── */
const bc = new BroadcastChannel('boothmate_sub');
bc.onmessage = (e) => {
  const { type, srcLines, transLines } = e.data || {};
  if (type === 'mirror' && srcLines && transLines) {
    renderSubtitles(srcLines, transLines);
  }
};

/* ── 초기 스타일 적용 ── */
applyStyles();
</script>
</body>
</html>
